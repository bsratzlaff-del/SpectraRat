services:
  # 1. The Database
  postgres:
    image: postgres:15-alpine
    container_name: spectrarat-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123 
      POSTGRES_DB: spectrarat
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # 2. The Spring Boot Backend
  backend:
    build: ./backend
    container_name: spectrarat-backend
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spectrarat
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_PROFILES_ACTIVE: dev
      APPLICATIONINSIGHTS_CONNECTION_STRING: "InstrumentationKey=be7a6991-59d4-45f5-b008-7afb9ebeeb3d;IngestionEndpoint=https://westus-0.in.applicationinsights.azure.com/;LiveEndpoint=https://westus.livediagnostics.monitor.azure.com/;ApplicationId=6b2f1bde-e241-4ae1-8cc7-8872bfe52d42"
    depends_on:
      - postgres

  # 3. The Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spectrarat-frontend
    ports:
      - "80:80" 
    depends_on:
      - backend

volumes:
  # Keeps the database data persistent between restarts!
  postgres-data: