server {
    listen 80;
    server_name 158.23.58.74;

    # Serve the Angular app
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # This line is crucial for Angular routing! If someone refreshes 
        # the page, it redirects them to index.html instead of throwing a 404.
        try_files $uri $uri/ /index.html;
    }

    # Forward any requests starting with /api to the Spring Boot backend
    location /api/ {
        # 'backend' will be the name of our container in Docker Compose
        proxy_pass http://backend:8082/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}