<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0" style="width: 100%; max-width: 450px;">
    <div class="card-body p-5">
      
      <h2 class="text-center fw-bold mb-4">
        {{ isRegisterMode ? 'Create an Account' : 'Sign In' }}
      </h2>

      <div *ngIf="errorMessage" class="alert alert-danger text-center small py-2">
        {{ errorMessage }}
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        
        <div *ngIf="isRegisterMode">
          <div class="mb-3">
            <label class="form-label small fw-bold">Business Name</label>
            <<input id="businessName" type="text" class="form-control" formControlName="businessName" placeholder="Enter business name">
          </div>
          
          <div class="mb-3">
            <label class="form-label small fw-bold">Email</label>
            <input id="email" type="email" class="form-control" formControlName="email" placeholder="Enter email address">
          </div>

          <div class="form-group">
            <input type="text" formControlName="streetAddress" placeholder="Street Address (e.g., 123 Tech Lane)">
          </div>

          <div class="row mb-3">
            <div class="form-group">
              <input type="text" formControlName="city" placeholder="City (e.g., Atlanta)">
            </div>
            <div class="form-group">
              <input type="text" formControlName="state" placeholder="State (e.g., GA)">
            </div>
            <div class="form-group">
              <input type="text" formControlName="zipCode" placeholder="Zip Code (e.g., 30301)">
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">Username</label>
          <input id="username" type="text" class="form-control" formControlName="username" placeholder="Enter Username">
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold">Password</label>
          <input id="password" type="password" class="form-control" formControlName="password" placeholder="Enter Password">
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-bold" [disabled]="registerForm.invalid">
          {{ isRegisterMode ? 'Register' : 'Sign In' }}
        </button>
      </form>

      <div class="mt-4 text-center">
        <p class="small text-muted mb-0">
          {{ isRegisterMode ? 'Already have an account?' : "Don't have an account?" }}
          <a (click)="toggleMode()" class="text-info fw-bold text-decoration-none" style="cursor: pointer;">
            {{ isRegisterMode ? 'Log in here.' : 'Sign up here.' }}
          </a>
        </p>
      </div>

    </div>
  </div>
</div>
