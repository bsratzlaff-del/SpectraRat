<div class="container py-5">
  <div class="text-center mb-5">
    <h1 class="display-3 fw-bold text-dark">Spectra<span class="text-primary">Rat</span></h1>
    <p class="lead text-secondary">Advanced Spectral Density Analysis for Wireless Hardware</p>
  </div>

  <div class="card shadow-lg border-0 rounded-4 overflow-hidden mb-5">
    <div class="card-header bg-dark text-white p-3">
      <h5 class="mb-0 px-2"><i class="bi bi-broadcast me-2"></i>Analysis Configuration</h5>
    </div>
    
    <div class="card-body p-4 bg-light">
      <div class="row g-4 align-items-end">
        
        <div class="col-md-4">
          <label class="form-label fw-semibold">Local Zip Code</label>
          <input type="text" [(ngModel)]="zipCode" class="form-control form-control-lg border-2" placeholder="e.g. 60601">
        </div>

        <div class="col-md-4">
          <label for="receiverSelect" class="form-label fw-semibold">Receiver Unit</label>
          <select id="receiverSelect" [(ngModel)]="selectedReceiverId" class="form-select form-select-lg border-2">
            <option *ngFor="let rx of receivers" [value]="rx.id">
              {{ rx.manufacturer }} {{ rx.modelName }}
            </option>
          </select>
        </div>

        <div class="col-md-4">
          <button (click)="analyzeSpectrum()" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            {{ loading ? 'ANALYZING...' : 'RUN ANALYSIS' }}
          </button>
        </div>

      </div>
    </div>
  </div>

  <div *ngIf="hasSearched">
    <h3 class="mb-4 text-dark border-bottom pb-2">Top Frequency Candidates</h3>
    
    <div class="row g-4">
      <div class="col-lg-4 col-md-6" *ngFor="let res of results | slice:0:3">
        <div class="card h-100 border-0 shadow-sm transition-hover" 
             [ngClass]="{
               'border-top-success': res.matchPercentage >= 95,
               'border-top-warning': res.matchPercentage >= 80 && res.matchPercentage < 95,
               'border-top-danger': res.matchPercentage < 80
             }">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <span class="badge rounded-pill" 
                    [ngClass]="{
                      'bg-success-subtle text-success border border-success': res.matchPercentage >= 95,
                      'bg-warning-subtle text-warning-emphasis border border-warning': res.matchPercentage >= 80 && res.matchPercentage < 95,
                      'bg-danger-subtle text-danger border border-danger': res.matchPercentage < 80
                    }">
                {{ res.status }}
              </span>
              <h2 class="h1 mb-0 fw-black text-dark">{{ res.matchPercentage }}%</h2>
            </div>
            
            <h5 class="card-title fw-bold mb-1">{{ res.modelName }}</h5>
            <p class="text-muted small mb-3">{{ res.description }}</p>
            
            <div class="progress progress-custom mb-3">
              <div class="progress-bar" 
                   [ngClass]="{'bg-success': res.matchPercentage >= 95, 'bg-warning': res.matchPercentage >= 80, 'bg-danger': res.matchPercentage < 80}"
                   [style.width.%]="res.matchPercentage"></div>
            </div>

            <div class="d-grid">
              <a [routerLink]="['/inventory', res.id]" class="btn btn-outline-primary fw-bold shadow-sm">
                <i class="bi bi-gear-fill me-2"></i>Configure & Purchase
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
