<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0" style="width: 100%; max-width: 450px;">
    <div class="card-body p-5">
      
      <h2 class="text-center fw-bold mb-4">
        {{ isRegisterMode ? 'Create an Account' : 'Sign In' }}
      </h2>

      <div *ngIf="errorMessage" class="alert alert-danger text-center small py-2">
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()">
        
        <div *ngIf="isRegisterMode">
          <div class="mb-3">
            <label class="form-label small fw-bold">Business Name</label>
            <input type="text" class="form-control" [(ngModel)]="formData.businessName" name="businessName" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label small fw-bold">Phone Number</label>
            <input type="text" class="form-control" [(ngModel)]="formData.phone" name="phone">
          </div>

          <div class="mb-3">
            <label class="form-label small fw-bold">Address</label>
            <input type="text" class="form-control" [(ngModel)]="formData.address" name="address">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">Username</label>
          <input type="text" class="form-control" [(ngModel)]="formData.username" name="username" required>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold">Password</label>
          <input type="password" class="form-control" [(ngModel)]="formData.password" name="password" required>
        </div>

        <button type="submit" class="btn btn-info w-100 fw-bold py-2 text-dark shadow-sm">
          {{ isRegisterMode ? 'Register' : 'Login' }}
        </button>
      </form>

      <div class="mt-4 text-center">
        <p class="small text-muted mb-0">
          {{ isRegisterMode ? 'Already have an account?' : "Don't have an account?" }}
          <a (click)="toggleMode()" class="text-info fw-bold text-decoration-none" style="cursor: pointer;">
            {{ isRegisterMode ? 'Log in here.' : 'Sign up here.' }}
          </a>
        </p>
      </div>

    </div>
  </div>
</div>
