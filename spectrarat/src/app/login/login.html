<div class="container py-5 mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-5">
          <h2 class="fw-bold text-center mb-4">Business Portal Login</h2>
          
          <div *ngIf="errorMessage" class="alert alert-danger rounded-3">
            {{ errorMessage }}
          </div>

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="email" class="form-label fw-bold">Email Address</label>
              <input type="email" id="email" name="email" class="form-control form-control-lg" 
                     [(ngModel)]="credentials.email" required>
            </div>
            
            <div class="mb-4">
              <label for="password" class="form-label fw-bold">Password</label>
              <input type="password" id="password" name="password" class="form-control form-control-lg" 
                     [(ngModel)]="credentials.password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Sign In</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
