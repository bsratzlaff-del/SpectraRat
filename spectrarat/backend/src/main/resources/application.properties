# Server Configuration
server.port=8082
server.address=0.0.0.0
server.shutdown=graceful
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# PostgreSQL Database Connection
# Inside Docker, it uses 'postgres'. Locally, it uses 'localhost'.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spectrarat}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA Configuration
# 'update' is safe for scaling—it adds new columns without deleting data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialization (For your data.sql scripts)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Logging (Keep these for your 'Golden Log' troubleshooting)
logging.level.com.spectrarat=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG